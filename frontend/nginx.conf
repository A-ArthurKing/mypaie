# ============================================================
# Fichier : nginx.conf
# Rôle    : Configuration Nginx pour servir le build React
#           et proxifier les appels /api/* vers le backend Flask.
# Module  : mypaie / frontend
# ============================================================

server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA React — toute route inconnue renvoie index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy transparent vers le backend Flask (réseau interne Docker)
    location /api/ {
        proxy_pass         http://backend:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Désactiver le cache pour index.html (important pour les déploiements)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
